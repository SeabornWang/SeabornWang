short_bio: >-

  <p>
    🚗 I am an <strong>MSc candidate in Vehicle Engineering at Tongji University</strong>, advised by Prof. Jun Ma.
    My research focuses on <strong>Human-AI Interaction</strong>, <strong>trust calibration</strong>, explainable AI,
    and intelligent in-vehicle systems.
  </p>

  <p>
    🧑‍🔬 I am particularly interested in how drivers interact with automated vehicles and LLM-based in-vehicle agents
    in safety-critical driving contexts. My recent work investigates transparency, user trust, takeover behavior,
    visual attention, cognitive workload, and AI hallucinations in intelligent vehicle systems.
  </p>

  <p>
    🤖 I am also working with the <strong>Ubiquitous X Lab at HKUST</strong>, where I study
    <strong>perceived danger in Human-Robot Interaction</strong>, especially how people perceive and respond to
    potentially unsafe robot behaviors.
  </p>

  <p>
    🎓 I am currently applying for <strong>Ph.D. programs for Fall 2027</strong>, with a broad interest in
    HCI, HAI, HRI and intelligent mobility systems.
  </p>


