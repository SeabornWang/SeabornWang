<div class="card border-0 shadow-sm bg-white">
  <div class="card-body p-4" style="font-size: 0.96rem; line-height: 1.6;">

    <h3 class="mb-4" style="font-size: 1.55rem; font-weight: 700;">
      About Me
    </h3>

    <div
      class="text-profile-bio mt-0"
      {% if site.data.profile.short_bio_text_justify %}
      style="text-align: justify;"
      {% endif %}
    >
      {{ site.data.profile.short_bio }}
    </div>

    {% if site.data.profile.cv_link %}
    <div class="mt-3">
      <a
        target="_blank"
        href="{{ site.data.profile.cv_link | relative_url }}"
        class="text-decoration-none"
        style="font-size: 0.94rem;"
      >
        <i class="fas fa-file-alt mr-1"></i> Curriculum Vitae
      </a>
    </div>
    {% endif %}

  </div>
</div>
