{% assign news_by_year = site.news | sort: "date" | reverse | slice: 0, include.limit | group_by_exp: "item", "item.date | date: '%Y'" -%}

<div class="card border-0 shadow-sm bg-white">
  <div class="card-body p-4" style="font-size: 0.96rem; line-height: 1.55;">

    <h5 class="card-title mb-3" style="font-size: 1rem; font-weight: 700;">
      <i class="fas fa-rss mr-2" style="font-size: 0.9rem;"></i>News
    </h5>

    {% for year in news_by_year %}
    <div class="d-flex align-items-start py-2 {% unless forloop.first %}border-top{% endunless %}" style="border-color: rgba(0,0,0,0.08) !important;">

      <div class="text-muted font-italic mr-4" style="width: 64px; flex: 0 0 64px; font-size: 0.92rem;">
        {{ year.name }}
      </div>

      <div class="flex-grow-1">
        {% for item in year.items %}
        <div class="d-flex align-items-baseline mb-2">
          <div style="flex: 1; min-width: 0; padding-right: 20px; font-size: 0.94rem;">
            {{ item.title }}
          </div>

          <div class="text-muted font-italic text-right" style="width: 72px; flex: 0 0 72px; font-size: 0.92rem;">
            {{ item.date | date: "%b %d" }}
          </div>
        </div>
        {% endfor %}
      </div>

    </div>
    {% endfor %}

  </div>
</div>
