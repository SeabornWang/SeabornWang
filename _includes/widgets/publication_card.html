<div class="card border-0 shadow-sm bg-white">
  <div class="card-body p-4" style="font-size: 0.96rem; line-height: 1.55;">

    {% if include.title %}
    <h5 class="card-title mb-3" style="font-size: 1rem; font-weight: 700;">
      {{ include.title }}
      <a href="{{ '/publications' | relative_url }}" style="font-size: 0.95rem; font-weight: 600;">
        (view all <i class="fas fa-angle-double-right"></i>)
      </a>
    </h5>
    {% endif %}

    {% for item in include.publications %}
    <div class="{% unless forloop.first %}border-top pt-3 mt-3{% endunless %}" style="border-color: rgba(0,0,0,0.08) !important;">
      {% include widgets/publication_item.html item=item %}
    </div>
    {% endfor %}

  </div>
</div>
